name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Expo Prebuild (Android native project)
        working-directory: artifacts/rpw-mobile
        run: pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.API_URL || 'https://rpw-booster-api.onrender.com' }}

      - name: Make Gradlew executable
        working-directory: artifacts/rpw-mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/rpw-mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx2g'

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RPW-BOOSTER-debug-${{ github.sha }}
          path: artifacts/rpw-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: artifacts/rpw-mobile/android
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx2g'

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: RPW-BOOSTER-release-unsigned-${{ github.sha }}
          path: artifacts/rpw-mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        continue-on-error: true
